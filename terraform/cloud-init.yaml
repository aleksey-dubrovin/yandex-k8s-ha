#cloud-config
write_files:
  # Скрипт для установки containerd
  - path: "/usr/local/etc/install-containerd.sh"
    permissions: "755"
    content: |
      #!/bin/bash
      set -e  # Останавливаем скрипт при любой ошибке
      echo "$(date): Starting containerd installation"

      # 1. Отключение swap
      sudo swapoff -a
      sudo sed -i '/ swap / s/^\(.*\)$/#\1/g' /etc/fstab

      # 2. Загрузка модулей ядра
      sudo modprobe overlay
      sudo modprobe br_netfilter
      sudo tee /etc/modules-load.d/containerd.conf <<EOF
      overlay
      br_netfilter
      EOF

      # 3. Настройка параметров сети (sysctl)
      sudo tee /etc/sysctl.d/99-kubernetes-cri.conf <<EOF
      net.bridge.bridge-nf-call-iptables = 1
      net.ipv4.ip_forward = 1
      net.bridge.bridge-nf-call-ip6tables = 1
      EOF
      sudo sysctl --system

      # 4. Установка и настройка containerd
      sudo apt-get update -y
      sudo apt-get install -y containerd
      sudo mkdir -p /etc/containerd
      sudo containerd config default | sudo tee /etc/containerd/config.toml
      # Включаем SystemdCgroup для совместимости с kubelet
      sudo sed -i 's/SystemdCgroup = false/SystemdCgroup = true/g' /etc/containerd/config.toml
      sudo systemctl restart containerd
      sudo systemctl enable containerd

      echo "$(date): containerd installation finished successfully"
    defer: true

  # Скрипт для установки kubeadm
  - path: "/usr/local/etc/install-kubeadm.sh"
    permissions: "755"
    content: |
      #!/bin/bash
      set -e
      echo "$(date): Starting kubeadm installation"

      # 5. Установка kubeadm, kubelet, kubectl
      sudo apt-get install -y apt-transport-https ca-certificates curl gpg
      curl -fsSL https://pkgs.k8s.io/core:/stable:/v1.29/deb/Release.key | sudo gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg
      echo 'deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v1.29/deb/ /' | sudo tee /etc/apt/sources.list.d/kubernetes.list
      sudo apt-get update -y
      sudo apt-get install -y kubelet kubeadm kubectl
      sudo apt-mark hold kubelet kubeadm kubectl
      sudo systemctl enable --now kubelet

      echo "$(date): kubeadm installation finished successfully"
    defer: true

  # Опционально: скрипт для проверки установки
  - path: "/usr/local/etc/check-installation.sh"
    permissions: "755"
    content: |
      #!/bin/bash
      echo "$(date): Checking node status"
      echo "containerd status:"
      sudo systemctl status containerd --no-pager | grep Active
      echo "kubelet status:"
      sudo systemctl status kubelet --no-pager | grep Active
      echo "$(date): Node is ready for kubeadm init/join"
    defer: true

# Команды, которые выполняются после записи файлов
runcmd:
  # Выполняем скрипты последовательно, с проверкой
  - bash /usr/local/etc/install-containerd.sh
  - bash /usr/local/etc/install-kubeadm.sh
  - bash /usr/local/etc/check-installation.sh